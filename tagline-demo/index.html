<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tagline Style Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #f8f9fa;
  padding: 40px 20px;
  min-height: 100vh;
}
h1 { text-align: center; font-size: 1.2rem; color: #666; margin-bottom: 50px; }
.grid {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 40px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 50px 40px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  text-align: center;
  position: relative;
}
.card::before {
  content: attr(data-label);
  position: absolute;
  top: 16px;
  left: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.tagline { font-size: 1.6rem; line-height: 1.6; }

/* === 1. Typewriter === */
.typewriter .tagline {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  color: #1a1a1a;
  border-right: 2px solid #333;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 2.5s steps(35) 0.5s forwards, blink 0.7s step-end infinite;
}
@keyframes typing { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }

/* === 2. Gradient Shimmer === */
.gradient .tagline {
  font-weight: 600;
  background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #667eea);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

/* === 3. Handwritten === */
.handwritten .tagline {
  font-family: 'Caveat', cursive;
  font-size: 2.4rem;
  font-weight: 700;
  color: #2c3e50;
  transform: rotate(-1.5deg);
  display: inline-block;
}

/* === 4. Fade Rotate (multi-sentence) === */
.rotate .tagline-wrap {
  height: 2.4em;
  overflow: hidden;
  position: relative;
}
.rotate .tagline {
  font-weight: 600;
  color: #1a1a1a;
  position: absolute;
  width: 100%;
  opacity: 0;
  animation: fadeRotate 9s infinite;
}
.rotate .tagline:nth-child(1) { animation-delay: 0s; }
.rotate .tagline:nth-child(2) { animation-delay: 3s; }
.rotate .tagline:nth-child(3) { animation-delay: 6s; }
@keyframes fadeRotate {
  0% { opacity: 0; transform: translateY(10px); }
  8% { opacity: 1; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(0); }
  38% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 0; }
}

/* === 5. Neon Glow === */
.neon { background: #1a1a2e; border-radius: 16px; }
.neon .tagline {
  font-weight: 600;
  color: #fff;
  text-shadow:
    0 0 7px rgba(102, 126, 234, 0.8),
    0 0 20px rgba(102, 126, 234, 0.5),
    0 0 40px rgba(118, 75, 162, 0.3);
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { text-shadow: 0 0 7px rgba(102,126,234,0.8), 0 0 20px rgba(102,126,234,0.5), 0 0 40px rgba(118,75,162,0.3); }
  50% { text-shadow: 0 0 14px rgba(102,126,234,1), 0 0 40px rgba(102,126,234,0.7), 0 0 80px rgba(118,75,162,0.5); }
}
</style>
</head>
<body>

<h1>Pick your favorite tagline style</h1>

<div class="grid">

  <div class="card typewriter" data-label="1 · Typewriter">
    <div class="tagline">Do small things with great love!</div>
  </div>

  <div class="card gradient" data-label="2 · Gradient Shimmer">
    <div class="tagline">Do small things with great love!</div>
  </div>

  <div class="card handwritten" data-label="3 · Handwritten">
    <div class="tagline">Do small things with great love!</div>
  </div>

  <div class="card rotate" data-label="4 · Fade Rotate">
    <div class="tagline-wrap">
      <div class="tagline">Do small things with great love!</div>
      <div class="tagline">Systems researcher · Compression enthusiast</div>
      <div class="tagline">Making LLMs fit where they couldn't before.</div>
    </div>
  </div>

  <div class="card neon" data-label="5 · Neon Glow">
    <div class="tagline">Do small things with great love!</div>
  </div>

</div>

</body>
</html>
