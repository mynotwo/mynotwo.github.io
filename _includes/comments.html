{% comment %}
  Giscus comments (backed by this repo's GitHub Discussions).
  Config lives in _config.yml under `giscus:`. Mapping by pathname so each
  post maps to its own Discussion automatically.
{% endcomment %}
<section class="post-comments">
  <h2 class="comments-title">{% if page.lang == "zh" %}评论{% else %}Comments{% endif %}</h2>
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.giscus.repo }}"
    data-repo-id="{{ site.giscus.repo_id }}"
    data-category="{{ site.giscus.category }}"
    data-category-id="{{ site.giscus.category_id }}"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="light"
    data-lang="{% if page.lang == 'zh' %}zh-CN{% else %}en{% endif %}"
    crossorigin="anonymous"
    async>
  </script>
</section>
