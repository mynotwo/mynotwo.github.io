<script>
(function() {
  var canvas = document.createElement('canvas');
  canvas.id = 'sparkles';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var particles = [];
  var mouseTrail = [];
  var meteors = [];
  var bokehs = [];
  var geos = [];
  var mouseX = -999, mouseY = -999;
  var colors = ['#667eea','#764ba2','#f093fb','#ffd700','#fff','#a78bfa','#38bdf8'];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX; mouseY = e.clientY;
    for (var i = 0; i < 2; i++) {
      mouseTrail.push({
        x: e.clientX + (Math.random() - 0.5) * 20,
        y: e.clientY + (Math.random() - 0.5) * 20,
        size: Math.random() * 3 + 1, opacity: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2 - 1
      });
    }
  });

  // === 1. STARS (3 layers) ===
  function Star() { this.reset(); this.y = Math.random() * canvas.height; }
  Star.prototype.reset = function() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    var roll = Math.random();
    if (roll < 0.1) {
      this.size = Math.random() * 4 + 5; this.maxOpacity = Math.random() * 0.3 + 0.7;
      this.fadeSpeed = Math.random() * 0.003 + 0.001; this.glow = true; this.layer = 'large';
    } else if (roll < 0.4) {
      this.size = Math.random() * 3 + 2.5; this.maxOpacity = Math.random() * 0.3 + 0.5;
      this.fadeSpeed = Math.random() * 0.005 + 0.002; this.glow = false; this.layer = 'medium';
    } else {
      this.size = Math.random() * 2 + 1; this.maxOpacity = Math.random() * 0.3 + 0.3;
      this.fadeSpeed = Math.random() * 0.008 + 0.003; this.glow = false; this.layer = 'small';
    }
    this.opacity = 0; this.growing = true;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
  };
  Star.prototype.update = function() {
    this.twinkle += this.twinkleSpeed;
    if (this.growing) { this.opacity += this.fadeSpeed * 2; if (this.opacity >= this.maxOpacity) this.growing = false; }
    else { this.opacity -= this.fadeSpeed; }
    if (this.opacity <= 0) this.reset();
  };
  Star.prototype.draw = function() {
    var alpha = this.opacity * (0.6 + 0.4 * Math.sin(this.twinkle));
    ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = this.color;
    if (this.glow) { ctx.shadowColor = this.color; ctx.shadowBlur = this.size * 3; }
    var s = this.size;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - s * 1.5);
    ctx.quadraticCurveTo(this.x + s * 0.3, this.y - s * 0.3, this.x + s * 1.5, this.y);
    ctx.quadraticCurveTo(this.x + s * 0.3, this.y + s * 0.3, this.x, this.y + s * 1.5);
    ctx.quadraticCurveTo(this.x - s * 0.3, this.y + s * 0.3, this.x - s * 1.5, this.y);
    ctx.quadraticCurveTo(this.x - s * 0.3, this.y - s * 0.3, this.x, this.y - s * 1.5);
    ctx.fill(); ctx.restore();
  };
  for (var i = 0; i < 55; i++) particles.push(new Star());

  // === 2. METEORS (shooting stars) ===
  function spawnMeteor() {
    meteors.push({
      x: Math.random() * canvas.width * 1.2,
      y: Math.random() * canvas.height * 0.4,
      length: Math.random() * 80 + 60,
      speed: Math.random() * 8 + 6,
      angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
      opacity: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 0
    });
  }
  setInterval(function() { if (Math.random() < 0.7) spawnMeteor(); }, 3500);

  function drawMeteors() {
    for (var i = meteors.length - 1; i >= 0; i--) {
      var m = meteors[i];
      m.x += Math.cos(m.angle) * m.speed;
      m.y += Math.sin(m.angle) * m.speed;
      m.life++;
      m.opacity = Math.max(0, 1 - m.life / 40);
      if (m.opacity <= 0) { meteors.splice(i, 1); continue; }
      ctx.save();
      var grad = ctx.createLinearGradient(
        m.x, m.y,
        m.x - Math.cos(m.angle) * m.length,
        m.y - Math.sin(m.angle) * m.length
      );
      grad.addColorStop(0, m.color);
      grad.addColorStop(1, 'transparent');
      ctx.globalAlpha = m.opacity * 0.8;
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - Math.cos(m.angle) * m.length, m.y - Math.sin(m.angle) * m.length);
      ctx.stroke();
      ctx.globalAlpha = m.opacity;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // === 3. BOKEH (dreamy floating circles) ===
  function Bokeh() { this.reset(); }
  Bokeh.prototype.reset = function() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 25 + 15;
    this.opacity = Math.random() * 0.12 + 0.04;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.2;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.01 + 0.005;
  };
  Bokeh.prototype.update = function() {
    this.x += this.vx; this.y += this.vy;
    this.pulse += this.pulseSpeed;
    if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) this.reset();
  };
  Bokeh.prototype.draw = function() {
    var alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.pulse));
    ctx.save();
    ctx.globalAlpha = alpha;
    var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    grad.addColorStop(0, this.color);
    grad.addColorStop(0.4, this.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  };
  for (var i = 0; i < 12; i++) bokehs.push(new Bokeh());

  // === 4. GEOMETRIC SHAPES (floating outlines) ===
  function Geo() { this.reset(); }
  Geo.prototype.reset = function() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 15 + 8;
    this.opacity = Math.random() * 0.2 + 0.08;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.008;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.sides = [3, 4, 5, 6][Math.floor(Math.random() * 4)];
  };
  Geo.prototype.update = function() {
    this.x += this.vx; this.y += this.vy;
    this.rotation += this.rotSpeed;
    if (this.x < -30 || this.x > canvas.width + 30 || this.y < -30 || this.y > canvas.height + 30) this.reset();
  };
  Geo.prototype.draw = function() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var i = 0; i <= this.sides; i++) {
      var angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
      var px = Math.cos(angle) * this.size;
      var py = Math.sin(angle) * this.size;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  };
  for (var i = 0; i < 10; i++) geos.push(new Geo());

  // === 5. NEURAL NETWORK (mouse-attracted constellation) ===
  function drawConstellations() {
    var connectable = [];
    for (var i = 0; i < particles.length; i++) {
      if (particles[i].layer !== 'small' && particles[i].opacity > 0.2) connectable.push(particles[i]);
    }
    for (var i = 0; i < connectable.length; i++) {
      // Mouse attraction: gently pull nearby stars toward cursor
      var dmx = mouseX - connectable[i].x;
      var dmy = mouseY - connectable[i].y;
      var mouseDist = Math.sqrt(dmx * dmx + dmy * dmy);
      if (mouseDist < 200 && mouseDist > 0) {
        var force = (1 - mouseDist / 200) * 0.4;
        connectable[i].x += dmx * force * 0.01;
        connectable[i].y += dmy * force * 0.01;
      }
      // Draw lines between nearby stars
      for (var j = i + 1; j < connectable.length; j++) {
        var dx = connectable[i].x - connectable[j].x;
        var dy = connectable[i].y - connectable[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          var lineAlpha = (1 - dist / 150) * 0.18 * Math.min(connectable[i].opacity, connectable[j].opacity);
          ctx.save(); ctx.globalAlpha = lineAlpha;
          ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(connectable[i].x, connectable[i].y);
          ctx.lineTo(connectable[j].x, connectable[j].y);
          ctx.stroke(); ctx.restore();
        }
      }
      // Line from star to mouse if close
      if (mouseDist < 150) {
        var la = (1 - mouseDist / 150) * 0.25 * connectable[i].opacity;
        ctx.save(); ctx.globalAlpha = la;
        ctx.strokeStyle = '#f093fb'; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(connectable[i].x, connectable[i].y);
        ctx.lineTo(mouseX, mouseY);
        ctx.stroke(); ctx.restore();
      }
    }
  }

  // === 6. AURORA (bottom waves) ===
  var auroraTime = 0;
  function drawAurora() {
    auroraTime += 0.003;
    var h = canvas.height;
    var w = canvas.width;
    ctx.save();
    for (var band = 0; band < 3; band++) {
      var yBase = h - 60 - band * 30;
      var bandColors = [
        'rgba(102, 126, 234, 0.06)',
        'rgba(240, 147, 251, 0.05)',
        'rgba(56, 189, 248, 0.05)'
      ];
      ctx.fillStyle = bandColors[band];
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (var x = 0; x <= w; x += 4) {
        var y = yBase + Math.sin(x * 0.003 + auroraTime + band * 1.5) * 20
                      + Math.sin(x * 0.007 + auroraTime * 1.3 + band) * 10;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // === MAIN LOOP ===
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawAurora();
    for (var i = 0; i < bokehs.length; i++) { bokehs[i].update(); bokehs[i].draw(); }
    for (var i = 0; i < geos.length; i++) { geos[i].update(); geos[i].draw(); }
    for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
    drawConstellations();
    drawMeteors();
    for (var i = mouseTrail.length - 1; i >= 0; i--) {
      var p = mouseTrail[i];
      p.x += p.vx; p.y += p.vy; p.opacity -= 0.03;
      if (p.opacity <= 0) { mouseTrail.splice(i, 1); continue; }
      ctx.save(); ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = p.size * 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>

<!-- 3D tilt effect for paper-box cards -->
<script>
(function() {
  var boxes = document.querySelectorAll('.paper-box');
  boxes.forEach(function(box) {
    box.addEventListener('mousemove', function(e) {
      var rect = box.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var centerX = rect.width / 2;
      var centerY = rect.height / 2;
      var rotateY = ((x - centerX) / centerX) * 8; // max 8deg
      var rotateX = ((centerY - y) / centerY) * 5; // max 5deg
      box.style.setProperty('--rx', rotateX + 'deg');
      box.style.setProperty('--ry', rotateY + 'deg');
    });
    box.addEventListener('mouseleave', function() {
      box.style.setProperty('--rx', '0deg');
      box.style.setProperty('--ry', '0deg');
    });
  });
})();
</script>

<!-- Scroll-triggered fade-in animations -->
<script>
(function() {
  // Add scroll-reveal class to paper-box elements and section headers
  var targets = document.querySelectorAll('.paper-box, .page__content h2, .page__content h1, .pub-theme');
  targets.forEach(function(el) {
    el.classList.add('scroll-reveal');
  });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.scroll-reveal').forEach(function(el) {
    observer.observe(el);
  });
})();
</script>

<!-- 6. Scroll progress bar -->
<div id="scroll-progress-bar"></div>
<script>
(function() {
  var bar = document.getElementById('scroll-progress-bar');
  window.addEventListener('scroll', function() {
    var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var scrollPercent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = scrollPercent + '%';
  });
})();
</script>

<!-- 7. Citation count-up animation -->
<script>
(function() {
  var citEl = document.getElementById('total_cit');
  if (!citEl) return;

  var animated = false;
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting && !animated) {
        animated = true;
        var target = parseInt(citEl.textContent, 10);
        if (isNaN(target) || target <= 0) return;
        var start = 0;
        var duration = 1500;
        var startTime = null;

        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          var progress = Math.min((timestamp - startTime) / duration, 1);
          // ease-out quad
          var eased = 1 - (1 - progress) * (1 - progress);
          citEl.textContent = Math.floor(eased * target);
          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            citEl.textContent = target;
          }
        }
        citEl.textContent = '0';
        requestAnimationFrame(step);
        observer.unobserve(citEl);
      }
    });
  }, { threshold: 0.5 });

  // Wait a moment for scholar stats to load
  setTimeout(function() {
    observer.observe(citEl);
  }, 1000);
})();
</script>

<!-- 8. Back-to-top button -->
<button id="back-to-top" aria-label="Back to top">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
</button>
<script>
(function() {
  var btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', function() {
    if (window.pageYOffset > 300) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
