<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KV Cache Compression Benchmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-subtle: #fafafa;
  --card-bg: #ffffff;
  --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 20px 60px -12px rgba(0,0,0,0.08);
  --card-shadow-hover: 0 8px 12px -2px rgba(0,0,0,0.08), 0 24px 80px -16px rgba(0,0,0,0.12);
  --border: #f0f0f0;
  --border-strong: #e5e5e5;

  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #86868b;

  --gradient-accent: linear-gradient(135deg, #2563eb, #7c3aed, #ec4899);

  --color-raw: #3b82f6;
  --color-preprocess: #8b5cf6;
  --color-pipeline: #f43f5e;
  --accent-gold: #eab308;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 60px 40px;
}

/* Header */
.header {
  margin-bottom: 48px;
  text-align: center;
}

.header h1 {
  font-size: 44px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.header p {
  font-size: 18px;
  color: var(--text-tertiary);
  font-weight: 400;
}

/* Controls */
.controls {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 32px;
  margin-bottom: 48px;
}

.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.control-row:last-child { margin-bottom: 0; }

.control-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0;
  min-width: 100px;
  flex-shrink: 0;
}

.pills { display: flex; gap: 6px; flex-wrap: wrap; }

.pill {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.16,1,.3,1);
  user-select: none;
  white-space: nowrap;
}

.pill:hover {
  border-color: var(--text-primary);
  color: var(--text-primary);
}

.pill.selected {
  background: var(--text-primary);
  border-color: var(--text-primary);
  color: #ffffff;
  box-shadow: none;
}

/* Insight Cards */
.insight-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 48px;
}

.insight-card {
  background: var(--card-bg);
  border: none;
  border-radius: 20px;
  padding: 32px;
  box-shadow: var(--card-shadow);
  transition: box-shadow 0.3s ease, transform 0.3s ease;
  animation: cardFadeIn 0.5s ease-out both;
}
.insight-card:nth-child(1) { animation-delay: 0ms; }
.insight-card:nth-child(2) { animation-delay: 80ms; }
.insight-card:nth-child(3) { animation-delay: 160ms; }

.insight-card:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-2px);
}

@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.insight-value {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 60px;
  font-weight: 800;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.insight-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.insight-detail {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 4px;
  font-weight: 400;
}

/* Chart */
.chart-container {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
}

/* Legend */
.legend {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  padding-bottom: 0;
  border-bottom: none;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* SVG styles */
.context-label {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 15px;
  font-weight: 600;
  fill: var(--text-primary);
  letter-spacing: -0.01em;
}

.method-label {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 13px;
  font-weight: 500;
}

.value-label {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  fill: #1d1d1f;
}

.row-bg { fill: transparent; }

.axis-line {
  stroke: var(--border-strong);
  stroke-width: 1;
}

/* Tooltip */
.tooltip {
  position: fixed;
  pointer-events: none;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.15s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  min-width: 210px;
}
.tooltip.visible { opacity: 1; }

.tooltip-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.tooltip-subtitle {
  color: var(--text-tertiary);
  font-size: 11px;
  margin-bottom: 12px;
}

.tooltip-row {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 3px;
  line-height: 1.6;
}

.tooltip-key { color: var(--text-secondary); }
.tooltip-val {
  color: var(--text-primary);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.tooltip-rank {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 11px;
}
.tooltip-rank .rank-pill {
  display: inline-block;
  background: var(--gradient-accent);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
}

/* Show all / top 8 toggle */
.chart-toggle {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 0;
  transition: color 0.2s ease;
  margin-left: auto;
}
.chart-toggle:hover { color: var(--text-primary); }

.legend-row {
  display: flex;
  align-items: center;
  margin-bottom: 28px;
  padding: 20px 32px;
  background: var(--card-bg);
  border-radius: 20px;
  box-shadow: var(--card-shadow);
}

/* Context panel cards */
.context-panel-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 32px;
  box-shadow: var(--card-shadow);
  margin-bottom: 24px;
  transition: box-shadow 0.3s ease;
  animation: cardFadeIn 0.5s ease-out both;
}
.context-panel-card:hover {
  box-shadow: var(--card-shadow-hover);
}

/* Responsive */
@media (max-width: 768px) {
  .insight-cards { grid-template-columns: 1fr; }
  .control-label { min-width: 80px; }
  .container { padding: 32px 16px 48px; }
  .header h1 { font-size: 28px; }
  .insight-value { font-size: 40px; }
  .chart-container { padding: 0; }
  .context-panel-card { padding: 20px 16px; }
  .legend-row { padding: 16px 20px; }
}
</style>
</head>

      <div class="pills" id="format-pills"></div>

      <div class="pills" id="model-pills"></div>

      <div class="pills" id="input-pills"></div>

  <div class="chart-container">

</div>

<div class="tooltip" id="tooltip">

  <div class="tooltip-row"><span class="tooltip-key">K&nbsp;&nbsp;</span><span class="tooltip-val" id="tt-k"></span></div>
  <div class="tooltip-row"><span class="tooltip-key">V&nbsp;&nbsp;</span><span class="tooltip-val" id="tt-v"></span></div>
  <div class="tooltip-rank" id="tt-rank"></div>
</div>

  'raw_gzip': 'Gzip',
  'transpose+zstd-1': 'Transpose + Zstd',
  'bytesplit+zstd-1': 'ByteSplit + Zstd',
  'pipeline_zstd-1': 'KVPress-Zstd',
  'pipeline_zstd-9': 'KVPress-Zstd-9',
  'pipeline_zstd-19': 'KVPress-Zstd-19',
  'pipeline_lz4': 'KVPress-LZ4',
  'pipeline_lzma': 'KVPress-LZMA'
};

const FORMATS = ['bf16','fp16','fp32','fp8_e4m3','fp8_e5m2','int8','int4','int2'];
const FORMAT_LABELS = {
  bf16:'BF16', fp16:'FP16', fp32:'FP32', fp8_e4m3:'FP8-E4M3',
  fp8_e5m2:'FP8-E5M2', int8:'INT8', int4:'INT4', int2:'INT2'
};
const MODELS = ['Qwen2.5-7B','Qwen3-8B'];
const INPUTS = ['all','english','code','math','chinese','json'];
const CONTEXTS = [512,1024,2048,4096,8192];
const COMPONENTS = ['KV','K','V'];

const state = { format:'bf16', model:'Qwen2.5-7B', input:'all', component:'KV' };
let showAll = false;
const DEFAULT_SHOW = 8;

// Build lookup index
const byKey = {};
Object.values(DATA).forEach(v => { byKey[`${v.model}_${v.context_length}_${v.input_type}`] = v; });

function getData(model, ctx, inputType, format, component) {
  if (inputType === 'all') {
    const types = ['english','code','math','chinese','json'];
    const result = {};
    METHODS.forEach(m => {
      let sum = 0, n = 0;
      types.forEach(inp => {
        const e = byKey[`${model}_${ctx}_${inp}`];
        if (e?.formats?.[format]?.[component]?.[m] != null) {
          sum += e.formats[format][component][m]; n++;
        }
      });
      result[m] = n > 0 ? sum / n : 0;
    });
    return result;
  }
  const e = byKey[`${model}_${ctx}_${inputType}`];
  return e?.formats?.[format]?.[component] || null;
}

function getColor(m) { return GROUP_COLORS[METHOD_GROUP[m]]; }

// Controls
function createPills(id, items, labels, key) {
  const el = document.getElementById(id);
  items.forEach(item => {
    const pill = document.createElement('button');
    pill.className = 'pill' + (state[key] === item ? ' selected' : '');
    pill.textContent = labels?.[item] || item;
    pill.onclick = () => {
      state[key] = item;
      el.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      update();
    };
    el.appendChild(pill);
  });
}
createPills('format-pills', FORMATS, FORMAT_LABELS, 'format');
createPills('model-pills', MODELS, null, 'model');
createPills('input-pills', INPUTS, null, 'input');
createPills('component-pills', COMPONENTS, null, 'component');

// Tooltip
const tooltip = document.getElementById('tooltip');

function showTooltip(evt, method, ctx, rank) {
  const {format, model, input} = state;
  const kv = getData(model, ctx, input, format, 'KV');
  const k = getData(model, ctx, input, format, 'K');
  const v = getData(model, ctx, input, format, 'V');
  document.getElementById('tt-title').textContent = METHOD_DISPLAY[method] || method;
  document.getElementById('tt-title').style.color = getColor(method);
  document.getElementById('tt-subtitle').textContent =
    `${FORMAT_LABELS[format]||format} · Context ${ctx.toLocaleString()} · ${input}`;
  document.getElementById('tt-kv').textContent = kv?.[method]?.toFixed(4)+'x' || '--';
  document.getElementById('tt-k').textContent = k?.[method]?.toFixed(4)+'x' || '--';
  document.getElementById('tt-v').textContent = v?.[method]?.toFixed(4)+'x' || '--';
  document.getElementById('tt-rank').textContent = `Rank: #${rank} of ${METHODS.length}`;
  tooltip.classList.add('visible');
  posTooltip(evt);
}

function posTooltip(e) {
  const r = tooltip.getBoundingClientRect();
  let x = e.clientX + 18, y = e.clientY - 30;
  if (x + r.width > window.innerWidth - 16) x = e.clientX - r.width - 18;
  if (y + r.height > window.innerHeight - 16) y = window.innerHeight - r.height - 16;
  if (y < 16) y = 16;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('visible')) posTooltip(e); });

// Chart
const margin = { top: 8, right: 80, bottom: 36, left: 155 };
const ROW_H = 32;
const PANEL_GAP = 56;
const HDR_H = 36;
const chartDiv = document.getElementById('chart');
let svgEl = null;

// Defs for glow filters
function ensureDefs(svg) {
  const defs = svg.append('defs');
  // Shadow filter for dots
  const f = defs.append('filter').attr('id', 'dotShadow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  f.append('feDropShadow').attr('dx','0').attr('dy','2').attr('stdDeviation','2').attr('flood-color','rgba(0,0,0,0.18)').attr('flood-opacity','1');
  // Radial gradients for each group color
  const gradients = [
    { id: 'dotGrad-raw', center: '#60a5fa', edge: '#3b82f6' },
    { id: 'dotGrad-preprocess', center: '#a78bfa', edge: '#8b5cf6' },
    { id: 'dotGrad-pipeline', center: '#fb7185', edge: '#f43f5e' }
  ];
  gradients.forEach(g => {
    const rg = defs.append('radialGradient').attr('id', g.id).attr('cx','35%').attr('cy','35%').attr('r','65%');
    rg.append('stop').attr('offset','0%').attr('stop-color', g.center);
    rg.append('stop').attr('offset','100%').attr('stop-color', g.edge);
  });
}

const filterIdx = { Raw: 0, Preprocess: 1, Pipeline: 2 };

function toggleShowAll() {
  showAll = !showAll;
  document.getElementById('toggle-rows').innerHTML = showAll ? 'Top 8 only &uarr;' : 'Show all 15 &rarr;';
  update();
}

function update() {
  const {format, model, input, component} = state;
  const W = chartDiv.clientWidth || 900;
  const innerW = W - margin.left - margin.right;
  const visibleCount = showAll ? METHODS.length : DEFAULT_SHOW;
  const AXIS_H = 22;
  const totalH = CONTEXTS.length * (HDR_H + visibleCount * ROW_H + AXIS_H) + (CONTEXTS.length - 1) * PANEL_GAP + margin.top + margin.bottom;

  // Compute shared x domain
  let xMax = 1.0;
  CONTEXTS.forEach(ctx => {
    const d = getData(model, ctx, input, format, component);
    if (d) METHODS.forEach(m => { if (d[m] > xMax) xMax = d[m]; });
  });
  xMax = xMax * 1.08;
  if (xMax < 1.15) xMax = 1.15;

  const x = d3.scaleLinear().domain([1.0, xMax]).range([0, innerW]).clamp(true);

  // Create or clear SVG
  if (svgEl) svgEl.remove();
  svgEl = d3.select('#chart').append('svg')
    .attr('width', W)
    .attr('height', totalH);

  ensureDefs(svgEl);

  const g = svgEl.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Compute round gridline values
  const ROUND_TICKS = [1.0, 1.5, 2.0, 3.0, 5.0, 10.0].filter(t => t >= 1.0 && t <= xMax);

  let yOff = 0;

  CONTEXTS.forEach((ctx, ci) => {
    const d = getData(model, ctx, input, format, component);
    if (!d) return;

    const allSorted = METHODS.slice().sort((a, b) => (d[b]||0) - (d[a]||0));
    const sorted = showAll ? allSorted : allSorted.slice(0, DEFAULT_SHOW);
    const bestVal = d[sorted[0]] || 0;
    const panelH = sorted.length * ROW_H;

    const panel = g.append('g').attr('transform', `translate(0,${yOff})`);

    // Section header
    panel.append('text')
      .attr('class', 'context-label')
      .attr('x', -margin.left + 12)
      .attr('y', 18)
      .text(`Context Length ${ctx.toLocaleString()}`);

    const rows = panel.append('g').attr('transform', `translate(0,${HDR_H})`);

    // Vertical gridlines at round values
    ROUND_TICKS.forEach(t => {
      rows.append('line')
        .attr('x1', x(t)).attr('x2', x(t))
        .attr('y1', 0).attr('y2', panelH)
        .attr('stroke', '#f0f0f0')
        .attr('stroke-width', 1);
    });

    // Axis baseline at 1.0
    rows.append('line')
      .attr('class', 'axis-line')
      .attr('x1', 0).attr('x2', 0)
      .attr('y1', 0).attr('y2', panelH);

    sorted.forEach((method, i) => {
      const val = d[method] || 0;
      const cy = i * ROW_H + ROW_H / 2;
      const color = getColor(method);
      const group = METHOD_GROUP[method];
      const isBest = val === bestVal && val > 1;
      const rank = i + 1;
      const xPos = x(val);
      const gradId = group === 'Raw' ? 'url(#dotGrad-raw)' : group === 'Preprocess' ? 'url(#dotGrad-preprocess)' : 'url(#dotGrad-pipeline)';

      const row = rows.append('g');

      // Method name
      row.append('text')
        .attr('class', 'method-label')
        .attr('x', -12)
        .attr('y', cy + 4)
        .attr('text-anchor', 'end')
        .attr('fill', color)
        .text(METHOD_DISPLAY[method] || method);

      // Lollipop stem
      row.append('line')
        .attr('x1', 0).attr('y1', cy)
        .attr('x2', 0).attr('y2', cy)
        .attr('stroke', color)
        .attr('stroke-opacity', 0.2)
        .attr('stroke-width', 2)
        .attr('stroke-linecap', 'round')
        .transition()
        .duration(500)
        .delay(ci * 50 + i * 30)
        .ease(d3.easeCubicOut)
        .attr('x2', xPos);

      // Gold ring for best
      if (isBest) {
        row.append('circle')
          .attr('cx', 0).attr('cy', cy)
          .attr('r', 13)
          .attr('fill', 'none')
          .attr('stroke', '#eab308')
          .attr('stroke-width', 2.5)
          .attr('opacity', 0)
          .transition()
          .duration(500)
          .delay(ci * 50 + i * 30 + 80)
          .ease(d3.easeCubicOut)
          .attr('cx', xPos)
          .attr('opacity', 0.9);
      }

      // Dot with radial gradient
      const dotR = isBest ? 11 : 9;
      const dot = row.append('circle')
        .attr('cx', 0).attr('cy', cy)
        .attr('r', dotR)
        .attr('fill', gradId)
        .attr('filter', 'url(#dotShadow)')
        .transition()
        .duration(500)
        .delay(ci * 50 + i * 30)
        .ease(d3.easeCubicOut)
        .attr('cx', xPos);

      // Value label
      row.append('text')
        .attr('class', 'value-label')
        .attr('x', 0).attr('y', cy + 4)
        .attr('opacity', 0)
        .transition()
        .duration(500)
        .delay(ci * 50 + i * 30)
        .ease(d3.easeCubicOut)
        .attr('x', xPos + 18)
        .attr('opacity', 1)
        .text(val.toFixed(2) + 'x');

      // Hover rect (transparent, on top)
      row.append('rect')
        .attr('x', -margin.left + 12)
        .attr('y', cy - ROW_H / 2)
        .attr('width', innerW + margin.left + margin.right - 24)
        .attr('height', ROW_H)
        .attr('fill', 'transparent')
        .attr('cursor', 'pointer')
        .on('mouseenter', function(e) {
          // Highlight the dot
          d3.select(this.parentNode).selectAll('circle').filter(function() {
            return d3.select(this).attr('fill') !== 'none';
          }).transition().duration(120).attr('r', dotR + 2);
          // Highlight the line
          d3.select(this.parentNode).select('line:not(.grid-line):not(.axis-line)')
            .transition().duration(120)
            .attr('stroke-opacity', 0.4)
            .attr('stroke-width', 3);
          showTooltip(e, method, ctx, rank);
        })
        .on('mouseleave', function() {
          d3.select(this.parentNode).selectAll('circle').filter(function() {
            return d3.select(this).attr('fill') !== 'none';
          }).transition().duration(200).attr('r', dotR);
          d3.select(this.parentNode).select('line:not(.grid-line):not(.axis-line)')
            .transition().duration(200)
            .attr('stroke-opacity', 0.2)
            .attr('stroke-width', 2);
          hideTooltip();
        });
    });

    // Per-panel x-axis line and tick labels
    const axisY = HDR_H + panelH;
    panel.append('line')
      .attr('x1', 0).attr('x2', innerW)
      .attr('y1', axisY).attr('y2', axisY)
      .attr('stroke', '#e5e5e5')
      .attr('stroke-width', 1);
    ROUND_TICKS.forEach(t => {
      const tx = x(t);
      panel.append('line')
        .attr('x1', tx).attr('x2', tx)
        .attr('y1', axisY).attr('y2', axisY + 4)
        .attr('stroke', '#e5e5e5')
        .attr('stroke-width', 1);
      panel.append('text')
        .attr('x', tx).attr('y', axisY + 16)
        .attr('text-anchor', 'middle')
        .attr('fill', '#86868b')
        .attr('font-family', "'Inter', -apple-system, sans-serif")
        .attr('font-size', '12px')
        .text(t.toFixed(1) + 'x');
    });

    yOff += HDR_H + panelH + AXIS_H;

    // Spacing between panels (no visible divider — whitespace only)
    if (ci < CONTEXTS.length - 1) {
      yOff += PANEL_GAP;
    }
  });

  // Per-panel axes are drawn above; no extra bottom axis needed.

  updateInsights();
}

function updateInsights() {
  const {format, model, input, component} = state;

  // Best Combo
  let bestVal = 0, bestMethod = '', bestCtx = 0;
  CONTEXTS.forEach(ctx => {
    const d = getData(model, ctx, input, format, component);
    if (!d) return;
    METHODS.forEach(m => { if (d[m] > bestVal) { bestVal = d[m]; bestMethod = m; bestCtx = ctx; } });
  });
  document.getElementById('insight-best').textContent = bestVal.toFixed(2) + 'x';
  document.getElementById('insight-best-detail').textContent = `${METHOD_DISPLAY[bestMethod] || bestMethod} @ context ${bestCtx.toLocaleString()}`;

  // V/K Gap: V_best / K_best ratio at ctx=2048
  const kd2048 = getData(model, 2048, input, format, 'K');
  const vd2048 = getData(model, 2048, input, format, 'V');
  let bestVKRatio = 1, bestVKMethod = '';
  if (kd2048 && vd2048) {
    METHODS.forEach(m => {
      const kVal = kd2048[m] || 1;
      const vVal = vd2048[m] || 1;
      const ratio = vVal / kVal;
      if (ratio > bestVKRatio) { bestVKRatio = ratio; bestVKMethod = m; }
    });
  }
  document.getElementById('insight-vk').textContent = bestVKRatio.toFixed(2) + 'x';
  document.getElementById('insight-vk-detail').textContent = `Value is ${bestVKRatio.toFixed(2)}x more compressible than Key`;

  // Context Scaling
  const d512 = getData(model, 512, input, format, component);
  const d8192 = getData(model, 8192, input, format, component);
  if (d512 && d8192) {
    let best8192m = '', best8192v = 0;
    METHODS.forEach(m => { if ((d8192[m]||0) > best8192v) { best8192v = d8192[m]; best8192m = m; } });
    const v512 = d512[best8192m] || 1;
    const pct = ((best8192v - v512) / v512 * 100);
    document.getElementById('insight-scaling').textContent = (pct>=0?'+':'') + pct.toFixed(0) + '%';
    document.getElementById('insight-scaling-detail').textContent = `${METHOD_DISPLAY[best8192m] || best8192m} · 512→8192`;
  } else {
    document.getElementById('insight-scaling').textContent = '--';
    document.getElementById('insight-scaling-detail').textContent = '--';
  }
}

update();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(update, 150);
});
</script>
</body>
